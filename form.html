<!DOCTYPE html>
<html lang="pt_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Formulário de cadastro</h1>
    <form>
        <label>Nome:</label>
        <input type = "text">
        <br><br>

        <label>E-mail:</label>
        <input type = "email">
        <br><br>

        <label>Senha:</label>
        <input type = "password">
        <br><br>

        <label>Data de nascimento:</label>
        <input type = "date">
        <br><br>

        <label>Sexo:</label>
        <input type="radio" name="sexo"> Masculino
        <input type="radio" name="sexo"> Feminino
        <br><br>

        <label>Interesses:</label> <br>
        <input type="checkbox"> Pintura <br>
        <input type="checkbox"> Tecnologia <br>
        <input type="checkbox"> Esportes <br>
        <input type="checkbox"> leitura <br>
        <input type="checkbox"> Culinária <br>
        <input type="checkbox"> Medicina
        <br><br>

        <label>Estado:</label>
        <select>
            <option>PR</option>
            <option>SC</option>
            <option>RS</option>
            <option>SP</option>
            <option>RJ</option>
        </select>
        <br><br>

        <input type="submit" value="Enviar">
    </form>
</body>
</html>
