<!DOCTYPE html>
<html lang="pt_BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição</title>
</head>
<body>
    <h1>Semana de tecnologia - Formulário de inscrição</h1>
<hr>
    <h2>Dados pessoais</h2>
    <form>
        <label>Nome:</label>
        <input type="text">
        <br><br>

        <label>Email:</label>
        <input type="email">
        <br><br>

        <label>Senha:</label>
        <input type="password">
        <br><br>
    </form>
<hr>
    <h2>Informações acadêmicas</h2>
    <form>
        <label>Série:</label>
        <select>
            <option>1° ano</option>
            <option>2° ano</option>
            <option>3° amo</option>
        </select>
        <br><br>

        <label>Curso:</label>
        <input type="radio" name="curso">NEM
        <input type="radio" name="curso">TDS
        <input type="radio" name="curso">PCP
    </form>
<hr>
    <h2>Preferências</h2>
    <form>
        <label><b>Áreas de interesse:</b></label> <br>
        <input type="checkbox">Linguagens <br>
        <input type="checkbox">Matemática <br>
        <input type="checkbox">Tecnología <br>
        <input type="checkbox">Ciências da natureza <br>
        <input type="checkbox">Ciências humanas <br>
        <input type="checkbox">Arte <br>
    </form>
<hr>
    <h2>Informações adicionais</h2>
    <p>Faça observações ou comentários abaixo</p>
    <form>
        <label>Comentário:</label>
        <textarea></textarea>
        <br><br>

        <button type="submet">Enviar</button>
    </form>
</body>
</html>
